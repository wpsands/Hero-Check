name: Sarah Martinez
title: VP of Marketing
industry: B2B SaaS
company_size: 200-500 employees
description: Pipeline owner at the same Series B dev tools company. Her angle — story and proof. She needs to turn whatever they buy into a narrative that generates demand. If the vendor's own hero section can't sell, how will she sell their integration to prospects?
priorities:
  - Can I build a co-marketing story around this partnership?
  - Does this vendor's brand elevate or dilute ours?
  - Are there customer proof points I can reference in our own campaigns?
  - Will prospects understand the value without a 10-minute explainer?
  - Does the messaging pass the "so what?" test for a non-technical buyer?
pain_points:
  - Technical products are hard to position without oversimplifying
  - Competitors all claim the same things with the same buzzwords
  - Engineering team writes copy that only engineers understand
  - No time to create custom collateral for every integration partner
  - Board wants pipeline numbers, not feature announcements
trust_signals:
  - Case studies with revenue or adoption metrics, not just logos
  - Clear before/after narrative she can adapt for her own content
  - Active developer community that creates organic buzz
  - Consistent messaging across their site, docs, and social presence
  - G2/TrustRadius reviews from people at companies like hers
